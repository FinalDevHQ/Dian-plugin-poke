name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 拉取主仓库（提供 packages/plugin-runtime 等本地依赖）
      - name: Checkout Dian monorepo
        uses: actions/checkout@v4
        with:
          repository: FinalDevHQ/Dian
          path: dian
          fetch-depth: 0

      # 2. 用本仓库内容覆盖 monorepo 里的 plugin-template 子目录
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: dian/plugin-template
          fetch-depth: 0

      - name: Read version from package.json
        id: pkg
        working-directory: dian/plugin-template
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        working-directory: dian/plugin-template
        run: |
          if git rev-parse "${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if tag already exists
        if: steps.check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.pkg.outputs.version }} already exists, skipping release."

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dian/package-lock.json

      # 3. 在 monorepo 根安装全部依赖（含原生模块）
      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        working-directory: dian
        run: npm ci

      # 4. 构建 packages（plugin-runtime 等本地依赖需要先编译出 dist）
      - name: Build packages
        if: steps.check.outputs.exists == 'false'
        working-directory: dian
        run: npm run build -w packages

      # 5. 打包插件
      - name: Pack plugin
        if: steps.check.outputs.exists == 'false'
        working-directory: dian/plugin-template
        run: npm run pack

      # 6. 读取 zip 文件名（来自 package.json name 字段）
      - name: Resolve zip filename
        if: steps.check.outputs.exists == 'false'
        id: meta
        working-directory: dian/plugin-template
        run: |
          NAME=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).name")
          echo "zip=${NAME}.zip" >> "$GITHUB_OUTPUT"

      # 7. 创建 tag
      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        working-directory: dian/plugin-template
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.pkg.outputs.version }}"
          git push origin "${{ steps.pkg.outputs.version }}"

      # 8. 创建 GitHub Release 并上传 zip
      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.version }}
          files: dian/plugin-template/${{ steps.meta.outputs.zip }}
          generate_release_notes: true
